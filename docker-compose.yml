version: '3.8'

services:
  app:
    build: .
    container_name: nutridrip-app
    ports:
      - '3006:3000'
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@localhost:5432/nutridrip}
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: nutridrip-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=nutridrip
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '5433:5432'

volumes:
  postgres-data:
